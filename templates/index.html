<!DOCTYPE html>
<html>
<head>
    <title>Realty AI Agent</title>
</head>
<body>

<h2>Property Search</h2>

<form method="post">
    Name: <input name="name"><br><br>
    Location: <input name="location"><br><br>

    Property Type:
    <select name="property_type">
        <option>Residential</option>
        <option>Commercial</option>
    </select><br><br>

    Subtype: <input name="subtype"><br><br>

    Budget: <input name="budget"><br><br>

    Consent:
    <select name="consent">
        <option>yes</option>
        <option>no</option>
    </select><br><br>

    <button type="submit">Submit</button>
</form>

</body>
</html>
