<script>
    document.querySelector("form").addEventListener("submit", async function(e) {
        e.preventDefault();

        const data = {
            name: document.querySelector("input[placeholder='Full Name']").value,
            location: document.querySelector("input[placeholder='e.g. Delhi, Mumbai']").value,
            type: document.querySelector("select").value,
            subtype: document.querySelector("input[placeholder='e.g. 2BHK, Shop, Plot']").value,
            budget: document.querySelector("input[placeholder='e.g. 50L, 1Cr']").value,
            sales_call: document.querySelectorAll("select")[1].value
        };

        const response = await fetch("/run-agent", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(data)
        });

        const result = await response.json();

        alert(
            "Properties Found: " + result.property_count +
            "\nStatus: " + result.status
        );
    });
</script>
